name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }}, ${{ matrix.deps }} deps)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        deps: [lowest, stable]

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl
          coverage: none

      - name: Install dependencies (lowest)
        if: matrix.deps == 'lowest'
        run: composer update --prefer-lowest --prefer-stable --no-interaction --no-progress

      - name: Install dependencies (stable)
        if: matrix.deps == 'stable'
        run: composer install --no-interaction --no-progress

      - name: Run tests
        run: composer test:ci

  code-style:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: openssl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Check code style
        run: composer phpcs:ci

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: openssl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPStan
        run: composer phpstan:ci
